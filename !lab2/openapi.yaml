components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    LoginDTO:
      properties:
        login:
          title: Login
          type: string
        password:
          title: Password
          type: string
      required:
      - login
      - password
      title: LoginDTO
      type: object
    MessageDTO:
      properties:
        text:
          title: Text
          type: string
        toUserId:
          title: Touserid
          type: string
      required:
      - toUserId
      - text
      title: MessageDTO
      type: object
    PostDTO:
      properties:
        content:
          title: Content
          type: string
        userId:
          title: Userid
          type: string
      required:
      - userId
      - content
      title: PostDTO
      type: object
    RegisterDTO:
      properties:
        firstName:
          title: Firstname
          type: string
        lastName:
          title: Lastname
          type: string
        login:
          title: Login
          type: string
        password:
          title: Password
          type: string
      required:
      - login
      - password
      - firstName
      - lastName
      title: RegisterDTO
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  title: Social Network API
  version: 0.1.0
openapi: 3.1.0
paths:
  /auth/login:
    post:
      operationId: login_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDTO'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Login
      tags:
      - Auth
  /auth/register:
    post:
      operationId: register_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDTO'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Register
      tags:
      - Auth
  /messages:
    post:
      operationId: send_message_messages_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageDTO'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Send Message
      tags:
      - Chat
  /messages/{userId}:
    get:
      operationId: get_messages_messages__userId__get
      parameters:
      - in: path
        name: userId
        required: true
        schema:
          title: Userid
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Messages
      tags:
      - Chat
  /posts:
    post:
      operationId: add_post_posts_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostDTO'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Add Post
      tags:
      - Wall
  /posts/{userId}:
    get:
      operationId: get_posts_posts__userId__get
      parameters:
      - in: path
        name: userId
        required: true
        schema:
          title: Userid
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Posts
      tags:
      - Wall
  /users:
    get:
      operationId: search_users_users_get
      parameters:
      - in: query
        name: name
        required: true
        schema:
          title: Name
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Search Users
      tags:
      - Users
  /users/by-login/{login}:
    get:
      operationId: get_user_users_by_login__login__get
      parameters:
      - in: path
        name: login
        required: true
        schema:
          title: Login
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get User
      tags:
      - Users
